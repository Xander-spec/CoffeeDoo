<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Вход в личный кабинет кофейни CoffeeDoo">
    <title>Вход в личный кабинет | CoffeeDoo</title>
    <link rel="stylesheet" href="style/style.css" />
    <link rel="shortcut icon" href="image/logo.png" type="image/x-icon" />
  </head>
  <body>
    <header class="header" role="banner">
      <div class="header__inner">
        <div
          class="header__logo-box"
          onclick="location.href='index.html'"
          aria-label="Перейти на главную страницу"
          role="link"
          tabindex="0"
          onkeydown="if(event.key==='Enter'){location.href='index.html'}"
        >
          <img src="image/logo.png" alt="logo" />Coffeedoo
        </div>
        <button
          class="burger"
          aria-label="Открыть меню"
          aria-expanded="false"
          aria-controls="mobile-menu"
          id="burger-btn"
          title="Открыть меню"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div
          class="header__nav-box"
          role="navigation"
          aria-label="Основная навигация"
        >
          <nav><a href="coffee-menu.html">Кофе</a></nav>
          <nav><a href="dessert-menu.html">Десерты</a></nav>
          <nav><a href="index.html#review">Отзывы</a></nav>
          <nav><a href="contact.html">Контакты</a></nav>
          <button class="header__btn" onclick="location.href='login.html'">
            Заказать
          </button>
        </div>
      </div>
    </header>
    <main class="main">
      <div class="container">
        <div class="login-container">
          <h3>Вход в личный кабинет</h3>
          <form>
            <label for="phone">Введите номер телефона:</label>
            <input type="text" id="phone" name="phone" required />
            <label for="password">Введите пароль:</label>
            <input type="password" id="password" name="password" required />
            <div class="link-box">
              <a href="register.html" class="no-account">Нет аккаунта</a>
              <a href="admin.html" class="no-account">Админка</a>
            </div>
            <button
              type="submit"
              class="login-button"
              onclick="location.href='account.html'"
            >
              Войти
            </button>
          </form>
        </div>
      </div>
    </main>
    <footer class="footer">
      <div class="footer__inner">
        <div class="footer__nav-box">
          <div class="footer-logo">
            <img src="image/logo.png" alt="logo" />
            <p>Coffeedoo</p>
          </div>
          <div class="footer-nav">
            <nav><a href="coffee-menu.html">Кофе</a></nav>
            <nav><a href="index.html#review">Отзывы</a></nav>
            <nav><a href="dessert-menu.html">Десерты</a></nav>
            <nav><a href="contact.html">Контакты</a></nav>
          </div>
        </div>
        <div class="footer__info">
          <p>Реквезиты</p>
          <p>ИП Кириллов Максим Владимирович</p>
          <p>ИНН 773213546784</p>
          <p>C077eDo@mail.ru</p>
        </div>
        <div class="footer__social">
          <a href="#"><img src="image/vk.png" alt="vk" /></a>
          <a href="#"><img src="image/inst.png" alt="inst" /></a>
          <a href="#"><img src="image/tg.png" alt="tg" /></a>
        </div>
      </div>
    </footer>
    <script src="script/burger.js"></script>
  </body>
</html>
